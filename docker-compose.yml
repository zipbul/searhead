services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    ports:
      - '${KNOLDR_DB_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: knoldr
      POSTGRES_PASSWORD: knoldr
      POSTGRES_DB: knoldr
    volumes:
      - knoldr-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U knoldr']
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - '${KNOLDR_PORT:-5100}:5100'
    environment:
      DATABASE_URL: postgres://knoldr:knoldr@db:5432/knoldr
      KNOLDR_PORT: '5100'
      KNOLDR_HOST: '0.0.0.0'
      KNOLDR_LOG_LEVEL: '${KNOLDR_LOG_LEVEL:-info}'
      KNOLDR_API_TOKEN: '${KNOLDR_API_TOKEN:-}'
      LANGSEARCH_API_KEY: '${LANGSEARCH_API_KEY:-}'
      # Local Ollama on the host. host.docker.internal maps to the
      # WSL host gateway via extra_hosts below — Linux Docker doesn't
      # resolve it automatically the way Docker Desktop does.
      OLLAMA_HOST: '${OLLAMA_HOST:-http://host.docker.internal:11434}'
      KNOLDR_OLLAMA_FAST_MODEL: '${KNOLDR_OLLAMA_FAST_MODEL:-gemma4:e4b}'
      KNOLDR_OLLAMA_JURY_MODELS: '${KNOLDR_OLLAMA_JURY_MODELS:-gemma4:e4b,qwen2.5:14b}'
      KNOLDR_OLLAMA_TIMEOUT_MS: '${KNOLDR_OLLAMA_TIMEOUT_MS:-120000}'
      # Cap onnxruntime per-op threads to prevent NLI / reranker /
      # embedding model forwards from saturating every core. We set
      # this at three layers because onnxruntime uses whichever
      # backend (wasm / node-native / openblas) it was linked with:
      #   - KNOLDR_ONNX_THREADS: read by configureOnnxRuntime() to
      #     set @huggingface/transformers env.backends.onnx.wasm.numThreads
      #   - OMP_NUM_THREADS / OPENBLAS_NUM_THREADS / MKL_NUM_THREADS:
      #     OS-level cap respected by native ORT + BLAS backends
      #   - ORT_INTRA_OP_NUM_THREADS: onnxruntime-node's own limit
      KNOLDR_ONNX_THREADS: '${KNOLDR_ONNX_THREADS:-4}'
      OMP_NUM_THREADS: '${OMP_NUM_THREADS:-4}'
      OPENBLAS_NUM_THREADS: '${OPENBLAS_NUM_THREADS:-4}'
      MKL_NUM_THREADS: '${MKL_NUM_THREADS:-4}'
      ORT_INTRA_OP_NUM_THREADS: '${ORT_INTRA_OP_NUM_THREADS:-4}'
      # Self-hosted SearXNG meta-search for web_search fallback when
      # an entry has no usable cited sources.
      SEARXNG_URL: '${SEARXNG_URL:-http://searxng:8080}'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # GPU inference: NLI / reranker / QA / embedding model forwards
    # run on CUDA via transformers.js' onnxruntime-node backend.
    # Shares the host GPU with the finetune sidecar — both containers
    # can run concurrently because inference only holds the GPU for
    # the duration of each forward pass and finetune is a rare (once
    # weekly) workload.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  db-test:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    ports:
      - '${KNOLDR_TEST_DB_PORT:-5433}:5432'
    environment:
      POSTGRES_USER: knoldr
      POSTGRES_PASSWORD: knoldr
      POSTGRES_DB: knoldr_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U knoldr']
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - test

  # Fine-tune sidecar: long-running container that wakes every
  # KNOLDR_FT_INTERVAL_HOURS (default 168 = weekly), checks if
  # enough new pseudo-gold has accumulated, and if so unloads
  # Ollama models, LoRA-trains Gemma 4 E4B, exports a quantized
  # GGUF, and registers it as knoldr-judge:vYYYYMMDD-HHMM. Default
  # cadence is weekly so training never starves the live verify
  # workers more than once a week and Ollama auto-reloads after.
  finetune:
    build:
      context: ./finetune
    environment:
      DATABASE_URL: postgres://knoldr:knoldr@db:5432/knoldr
      OLLAMA_HOST: 'http://host.docker.internal:11434'
      KNOLDR_FT_GGUF_OUT: '/ollama-models/knoldr'
      KNOLDR_FT_INTERVAL_HOURS: '${KNOLDR_FT_INTERVAL_HOURS:-24}'
      KNOLDR_FT_MIN_SAMPLES: '${KNOLDR_FT_MIN_SAMPLES:-200}'
      KNOLDR_FT_FORCE_NOW: '${KNOLDR_FT_FORCE_NOW:-0}'
      # Disable torch.compile / inductor JIT. unsloth invokes triton
      # codegen for fused kernels which then asks gcc to compile a
      # cuda_utils.c shim against libcuda.so.1; the link succeeds in
      # isolation but fails inside the inductor pipeline (cause
      # unclear, likely sysconfig-deps mismatch in the WSL CUDA stack).
      # LoRA training at max_steps=600 doesn't need fused kernels — we
      # accept the unsloth slowdown to keep the chain unblocked.
      TORCHDYNAMO_DISABLE: '1'
      TORCH_COMPILE_DISABLE: '1'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - /home/revil/.ollama/models:/ollama-models
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # SearXNG meta-search: aggregates Google, Bing, DuckDuckGo, Wikipedia,
  # GitHub, arXiv etc. Self-hosted so we get unmetered queries and can
  # tune engine selection per claim type. JSON API enabled via baked-in
  # settings.yml (Docker Desktop on WSL has issues with bind-mounting
  # to /etc/searxng, so we COPY the config into the image instead).
  searxng:
    build:
      context: .
      dockerfile: Dockerfile.searxng
    environment:
      BASE_URL: 'http://searxng:8080/'
      INSTANCE_NAME: 'knoldr-searxng'
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: unless-stopped

volumes:
  knoldr-data:
